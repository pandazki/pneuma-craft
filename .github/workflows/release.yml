name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}

jobs:
  release:
    # Skip on the changesets bot's own commits to avoid loops.
    if: github.repository == 'pandazki/pneuma-craft'
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create Version Packages PR + tags
      pull-requests: write  # open / update the PR
      id-token: write       # OIDC token for npm trusted publishing
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      # Node is needed because publish goes through `npm publish --provenance`,
      # which performs the OIDC token exchange. bun publish doesn't support
      # --provenance yet, but we still need bun to pack (it rewrites
      # `workspace:*` deps to concrete versions).
      #
      # Node 24 ships with npm 11+, which is required for trusted-publisher
      # OIDC auth on the actual publish PUT (npm 10 can sign provenance but
      # still wants a token for the upload itself).
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - run: bun install --frozen-lockfile

      - run: bun run build

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          # changesets/action runs this without a shell and splits on
          # whitespace ignoring quotes, so chained commands have to live
          # inside a real script file.
          version: scripts/release-version.sh
          publish: bun run release
          commit: 'chore: release packages'
          title: 'chore: release packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
